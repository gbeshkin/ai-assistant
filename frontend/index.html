<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallinn AI Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="panel hero-panel">
      <div class="hero-copy">
        <div class="badge">Tallinn AI Assistant v3</div>
        <h1>Виртуальный городской ассистент</h1>
      
      </div>

      <div class="avatar-card">
        <div class="avatar-stage" id="avatarStage">
          <img class="avatar-image" src="face.svg" alt="AI avatar" />
          <div class="mouth" id="mouth"></div>
          <div class="status-light" id="statusLight"></div>
        </div>
        <div class="avatar-status" id="statusText">Готов к вопросам</div>
      </div>
    </div>

    <div class="panel controls-panel">
      <div class="toolbar">
        <label>
          Язык ответа
          <select id="language">
            <option value="ru">Русский</option>
            <option value="et">Eesti</option>
            <option value="en">English</option>
          </select>
        </label>

        <label class="voice-toggle">
          <input type="checkbox" id="voiceEnabled" checked />
          Озвучивать ответ
        </label>
      </div>

      <div class="chat-box">
        <textarea id="question" placeholder="Например: Как получить парковочное разрешение в Таллинне?"></textarea>
        <button id="askBtn">Спросить</button>
      </div>

      <div class="meta-line">
        <span id="provider">Provider: demo</span>
        <span id="model">Model: built-in-demo</span>
      </div>

      <div class="answer-card">
        <h2>Ответ</h2>
        <p id="answer">Здесь появится ответ ассистента.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
