<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallinn AI Assistant v4</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Tallinn AI Assistant</h1>
    <div class="main-grid">
      <div class="avatar-card">
        <div class="avatar-wrap">
          <img src="/static/face.svg" alt="avatar" />
          <div class="mouth" id="mouth"></div>
        </div>
      </div>
      <div class="chat-card">
        <label for="question">Ваш вопрос</label>
        <textarea id="question" placeholder="Например: Kuidas saada parkimisluba Tallinnas?"></textarea>
        <div class="actions" style="gap: 8px; flex-wrap: wrap;">
          <button id="askBtn">Спросить</button>
          <button id="micBtn" type="button">🎤 Говорить</button>
          <button id="stopMicBtn" type="button">⏹ Стоп</button>
          <div class="status" id="status">Готов</div>
        </div>
        <div class="answer" id="answer"></div>
      </div>
    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
