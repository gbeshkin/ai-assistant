<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallinn AI Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    textarea { width: 100%; min-height: 120px; }
    button { padding: 10px 16px; margin-top: 12px; cursor: pointer; }
    .row { margin-bottom: 16px; }
    .answer { white-space: pre-wrap; background: #f5f5f5; padding: 12px; border-radius: 8px; }
    audio { width: 100%; margin-top: 12px; }
    .status { color: #555; }
    .muted { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Tallinn AI Assistant v2</h1>
  <p class="muted">Railway-ready cloud version: text + optional audio.</p>

  <div class="row">
    <label for="question">question</label>
    <textarea id="question">Какие документы нужны для регистрации места жительства в Таллинне?</textarea>
  </div>
  
  <div class="row">
    <label><input type="checkbox" id="useAudio" checked /> use Audio</label>
  </div>
  <button id="askBtn">ask</button>
  <p class="status" id="status"></p>

  <h2>answer</h2>
  <div class="answer" id="answer"></div>

  <h2>audio</h2>
  <audio id="audio" controls></audio>

  <script>
    const API_BASE = window.location.origin;

    document.getElementById('askBtn').addEventListener('click', async () => {
      const question = document.getElementById('question').value.trim();
      const useAudio = document.getElementById('useAudio').checked;
      const status = document.getElementById('status');
      const answer = document.getElementById('answer');
      const audio = document.getElementById('audio');

      if (!question) {
        alert('question');
        return;
      }

      status.textContent = 'wait...';
      answer.textContent = '';
      audio.removeAttribute('src');
      audio.load();

      try {
        const res = await fetch(`${API_BASE}/api/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, language, use_audio: useAudio })
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Request failed');
        }

        answer.textContent = data.answer;
        if (data.audio_url) {
          audio.src = `${API_BASE}${data.audio_url}`;
          audio.load();
        }
        status.textContent = `done: ${data.request_id} (${data.provider})`;
      } catch (err) {
        status.textContent = `error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
